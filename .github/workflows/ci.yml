name: CI

on:
  push:
    branches: [main]
    paths:
      - 'f1_predictor/**'
  pull_request:
    paths:
      - 'f1_predictor/**'

defaults:
  run:
    working-directory: f1_predictor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'f1_predictor/requirements.txt'

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . ruff pytest

      - name: Lint
        run: ruff check src tests

      - name: Tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push, smoke test)
        uses: docker/build-push-action@v6
        with:
          context: f1_predictor
          push: false
          tags: f1-predictor:ci
